<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Project Detail | HK Builders & Developers</title>
  <link rel="stylesheet" href="/assets/css/loader.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <script src="/assets/js/loader.js"></script>
  <style>
    :root{--navy:#0a1628;--navy-mid:#0e1e38;--navy-light:#152844;--gold:#c9a84c;--gold-light:#e2c97e;--gold-pale:#f0dfa0;--white:#ffffff;--white-muted:rgba(255,255,255,0.55);--gold-gradient:linear-gradient(135deg,#c9a84c 0%,#f0dfa0 50%,#c9a84c 100%);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--navy);color:var(--white);font-family:'Jost',sans-serif;font-weight:300;overflow-x:hidden;cursor:none;}
    .cursor{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:99990;transform:translate(-50%,-50%);transition:transform 0.1s ease;}
    .cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(201,168,76,0.5);border-radius:50%;pointer-events:none;z-index:99989;transform:translate(-50%,-50%);transition:all 0.15s ease;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:1;opacity:0.4;}
    .gold-top-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--gold-gradient);z-index:9999;transform-origin:left;transform:scaleX(0);transition:transform 0.1s linear;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes gridShift{0%{transform:translateY(0);}100%{transform:translateY(80px);}}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:22px 60px;display:flex;align-items:center;justify-content:space-between;transition:all 0.4s ease;}
    nav.scrolled{background:rgba(10,22,40,0.95);backdrop-filter:blur(20px);padding:14px 60px;border-bottom:1px solid rgba(201,168,76,0.15);}
    .nav-logo{display:flex;align-items:center;gap:14px;text-decoration:none;}
    .nav-logo-mark{width:48px;height:48px;border:1.5px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;font-size:18px;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .nav-logo-text .name{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:16px;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;text-transform:uppercase;}
    .nav-logo-text .sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--white-muted);}
    .nav-links{display:flex;align-items:center;gap:40px;list-style:none;}
    .nav-links a{text-decoration:none;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--white-muted);position:relative;transition:color 0.3s ease;}
    .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s ease;}
    .nav-links a:hover,.nav-links a.active{color:var(--gold-light);}
    .nav-links a:hover::after,.nav-links a.active::after{width:100%;}
    .nav-cta{padding:10px 28px;border:1px solid var(--gold);color:var(--gold)!important;font-size:11px!important;letter-spacing:2px;text-transform:uppercase;text-decoration:none;transition:all 0.3s ease!important;}
    .nav-cta::after{display:none!important;}
    .nav-cta:hover{background:var(--gold)!important;color:var(--navy)!important;}
    .hamburger{display:none;flex-direction:column;gap:5px;cursor:none;}
    .hamburger span{display:block;width:28px;height:1.5px;background:var(--gold);}
    .mobile-menu{position:fixed;inset:0;background:var(--navy);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;transform:translateX(100%);transition:transform 0.5s cubic-bezier(0.16,1,0.3,1);}
    .mobile-menu.open{transform:translateX(0);}
    .mobile-menu a{font-family:'Cormorant Garamond',serif;font-size:40px;font-weight:300;text-decoration:none;color:var(--white);transition:color 0.3s ease;}
    .mobile-menu a:hover{color:var(--gold);}

    /* HERO */
    .hero{position:relative;height:100vh;min-height:700px;display:flex;align-items:flex-end;overflow:hidden;}
    .hero-bg-layer{position:absolute;inset:0;background:linear-gradient(160deg,#0a1f3c 0%,#0e2a4a 40%,#0a1628 100%);}
    .hero-bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
    .hero-grid-layer{position:absolute;inset:0;background-image:linear-gradient(rgba(201,168,76,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.06) 1px,transparent 1px);background-size:80px 80px;animation:gridShift 20s linear infinite;}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,22,40,0.98) 0%,rgba(10,22,40,0.4) 60%,rgba(10,22,40,0.15) 100%);}
    .hero-illustration{position:absolute;right:0;bottom:0;width:55%;height:90%;opacity:0.12;pointer-events:none;}
    .hero-content{position:relative;z-index:2;padding:0 60px 80px;width:100%;}
    .hero-breadcrumb{display:flex;align-items:center;gap:12px;margin-bottom:24px;opacity:0;animation:fadeUp 0.8s ease 0.3s forwards;}
    .hero-breadcrumb a{text-decoration:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--white-muted);transition:color 0.3s ease;}
    .hero-breadcrumb a:hover{color:var(--gold);}
    .hero-breadcrumb-sep{color:rgba(201,168,76,0.4);}
    .hero-breadcrumb-current{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
    .hero-marketed{display:inline-flex;align-items:center;gap:10px;padding:7px 18px;border:1px solid rgba(201,168,76,0.3);background:rgba(10,22,40,0.6);backdrop-filter:blur(10px);margin-bottom:20px;opacity:0;animation:fadeUp 0.8s ease 0.4s forwards;}
    .marketed-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 2s ease infinite;}
    .marketed-text{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold-light);}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(52px,8vw,110px);font-weight:300;line-height:0.95;margin-bottom:16px;opacity:0;animation:fadeUp 0.9s ease 0.5s forwards;}
    .hero-title em{font-style:italic;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .hero-developer{font-size:14px;color:var(--white-muted);letter-spacing:1px;margin-bottom:40px;opacity:0;animation:fadeUp 0.9s ease 0.7s forwards;}
    .hero-developer strong{color:var(--gold-light);font-weight:400;}
    .hero-actions{display:flex;align-items:center;gap:20px;opacity:0;animation:fadeUp 0.9s ease 0.9s forwards;flex-wrap:wrap;}
    .btn-primary{padding:16px 40px;background:var(--gold-gradient);color:var(--navy);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;display:inline-block;transition:transform 0.3s ease,box-shadow 0.3s ease;position:relative;overflow:hidden;border:none;cursor:none;}
    .btn-primary::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);transform:translateX(-100%);transition:transform 0.4s ease;}
    .btn-primary:hover::before{transform:translateX(0);}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 50px rgba(201,168,76,0.3);}
    .btn-ghost{padding:15px 40px;border:1px solid rgba(201,168,76,0.35);color:var(--white);text-decoration:none;font-size:11px;letter-spacing:3px;text-transform:uppercase;display:inline-block;transition:all 0.3s ease;}
    .btn-ghost:hover{border-color:var(--gold);color:var(--gold-light);}
    .hero-scroll{position:absolute;right:60px;bottom:80px;display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;animation:fadeUp 1s ease 1.2s forwards;}
    .hero-scroll-line{width:1px;height:60px;background:linear-gradient(to bottom,transparent,var(--gold),transparent);animation:scrollP 2s ease infinite;}
    @keyframes scrollP{0%,100%{opacity:0.4}50%{opacity:1}}
    .hero-scroll-text{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--white-muted);writing-mode:vertical-rl;}

    /* HIGHLIGHTS BAR */
    .highlights{background:var(--navy-mid);border-bottom:1px solid rgba(201,168,76,0.12);}
    .highlights-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);}
    .hl-item{padding:30px;border-right:1px solid rgba(201,168,76,0.1);text-align:center;transition:background 0.3s ease;}
    .hl-item:last-child{border-right:none;}
    .hl-item:hover{background:rgba(201,168,76,0.04);}
    .hl-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
    .hl-value{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:400;}

    /* OVERVIEW */
    .overview{padding:100px 60px;background:var(--navy);}
    .overview-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:start;}
    .eyebrow{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
    .eyebrow-line{width:40px;height:1px;background:var(--gold-gradient);}
    .eyebrow span{font-size:10px;letter-spacing:4px;text-transform:uppercase;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-weight:500;}
    .section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(34px,3.5vw,52px);font-weight:300;line-height:1.1;margin-bottom:24px;}
    .section-title em{font-style:italic;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .overview-body{font-size:15px;line-height:1.95;color:var(--white-muted);margin-bottom:24px;}
    .divider{width:50px;height:1px;background:var(--gold-gradient);margin:28px 0;}
    .overview-quote{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;color:rgba(255,255,255,0.7);line-height:1.6;border-left:2px solid rgba(201,168,76,0.4);padding-left:24px;}
    .info-table{width:100%;border-collapse:collapse;}
    .info-table tr{border-bottom:1px solid rgba(201,168,76,0.08);}
    .info-table tr:first-child{border-top:1px solid rgba(201,168,76,0.08);}
    .info-table td{padding:17px 0;font-size:13px;vertical-align:top;}
    .info-table td:first-child{color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-size:9px;width:40%;padding-right:20px;}
    .info-table td:last-child{color:var(--white);font-family:'Cormorant Garamond',serif;font-size:17px;}

    /* MASONRY GALLERY */
    .gallery-section{padding:100px 60px;background:var(--navy-mid);}
    .gallery-header{max-width:1400px;margin:0 auto 60px;}
    .masonry-grid{max-width:1400px;margin:0 auto;columns:3;column-gap:6px;}
    .masonry-item{break-inside:avoid;margin-bottom:6px;position:relative;overflow:hidden;cursor:none;}
    .masonry-item:hover .masonry-inner{transform:scale(1.04);}
    .masonry-inner{transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);width:100%;display:block;}
    /* varied heights */
    .masonry-item:nth-child(3n+1) .masonry-inner{height:360px;}
    .masonry-item:nth-child(3n+2) .masonry-inner{height:260px;}
    .masonry-item:nth-child(3n+3) .masonry-inner{height:300px;}
    .masonry-inner img{width:100%;height:100%;object-fit:cover;display:block;}
    .masonry-inner .m-svg{width:100%;height:100%;display:block;}
    .masonry-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,22,40,0.9) 0%,transparent 60%);opacity:0;transition:opacity 0.4s ease;display:flex;flex-direction:column;justify-content:flex-end;padding:24px;}
    .masonry-item:hover .masonry-overlay{opacity:1;}
    .masonry-caption{color:var(--white);font-family:'Cormorant Garamond',serif;font-size:18px;transform:translateY(8px);transition:transform 0.4s ease;}
    .masonry-item:hover .masonry-caption{transform:translateY(0);}
    .masonry-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:4px;}
    .masonry-zoom{position:absolute;top:16px;right:16px;width:38px;height:38px;border:1px solid rgba(255,255,255,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0.8);transition:all 0.3s ease;background:rgba(10,22,40,0.5);}
    .masonry-item:hover .masonry-zoom{opacity:1;transform:scale(1);}
    .masonry-zoom svg{width:15px;height:15px;fill:var(--white);}

    /* LIGHTBOX */
    .lightbox{position:fixed;inset:0;z-index:99999;background:rgba(5,12,25,0.97);display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all 0.4s ease;backdrop-filter:blur(12px);}
    .lightbox.active{opacity:1;visibility:visible;}
    .lb-close{position:fixed;top:28px;right:36px;width:48px;height:48px;border:1px solid rgba(201,168,76,0.3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:none;transition:all 0.3s ease;background:rgba(10,22,40,0.8);}
    .lb-close:hover{border-color:var(--gold);}
    .lb-close svg{width:18px;height:18px;fill:var(--white);}
    .lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);width:52px;height:52px;border:1px solid rgba(201,168,76,0.25);display:flex;align-items:center;justify-content:center;cursor:none;transition:all 0.3s ease;background:rgba(10,22,40,0.7);}
    .lb-prev{left:28px;}.lb-next{right:28px;}
    .lb-prev:hover,.lb-next:hover{border-color:var(--gold);}
    .lb-prev svg,.lb-next svg{width:20px;height:20px;fill:var(--white);}
    .lb-content{max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center;}
    .lb-display{width:min(85vw,1000px);height:70vh;overflow:hidden;}
    .lb-display img,.lb-display svg{width:100%;height:100%;object-fit:contain;display:block;}
    .lb-caption-bar{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);text-align:center;}
    .lb-caption-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;}
    .lb-caption-sub{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-top:4px;}
    .lb-counter{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:3px;color:var(--white-muted);}

    /* AMENITIES */
    .amenities{padding:100px 60px;background:var(--navy);}
    .amenities-inner{max-width:1400px;margin:0 auto;}
    .amenities-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:60px;}
    .amenity-card{background:var(--navy-mid);border:1px solid rgba(201,168,76,0.08);padding:36px 28px;text-align:center;transition:all 0.3s ease;position:relative;overflow:hidden;}
    .amenity-card::before{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px;background:var(--gold-gradient);transform:scaleX(0);transform-origin:center;transition:transform 0.4s ease;}
    .amenity-card:hover::before{transform:scaleX(1);}
    .amenity-card:hover{border-color:rgba(201,168,76,0.2);}
    .amenity-icon{width:52px;height:52px;border:1px solid rgba(201,168,76,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;transition:all 0.3s ease;}
    .amenity-card:hover .amenity-icon{border-color:var(--gold);background:rgba(201,168,76,0.08);}
    .amenity-icon svg{width:22px;height:22px;}
    .amenity-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:400;margin-bottom:8px;}
    .amenity-desc{font-size:12px;color:var(--white-muted);line-height:1.6;}

    /* MAP */
    .map-section{padding:100px 60px;background:var(--navy-mid);}
    .map-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 2fr;gap:60px;align-items:start;}
    .map-frame{width:100%;height:460px;border:1px solid rgba(201,168,76,0.15);overflow:hidden;filter:grayscale(1) invert(0.9) sepia(0.3) hue-rotate(180deg) saturate(0.8) brightness(0.65);}
    .map-frame iframe{width:100%;height:100%;border:0;}
    .map-addr{background:rgba(10,22,40,0.9);border:1px solid rgba(201,168,76,0.2);padding:28px;margin-top:16px;display:flex;gap:14px;}
    .map-addr-icon{width:38px;height:38px;border:1px solid rgba(201,168,76,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .map-addr-icon svg{width:16px;height:16px;fill:var(--gold);}
    .map-addr-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:5px;}
    .map-addr-val{font-size:14px;line-height:1.5;}

    /* ENQUIRY */
    .enquiry{padding:100px 60px;background:var(--navy);}
    .enquiry-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:100px;align-items:center;}
    .form-wrap{display:flex;flex-direction:column;gap:18px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
    .form-group{display:flex;flex-direction:column;gap:8px;}
    .form-group label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);}
    .form-group input,.form-group select,.form-group textarea{background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.15);padding:14px 18px;color:var(--white);font-family:'Jost',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color 0.3s ease;width:100%;}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--gold);}
    .form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,0.2);}
    .form-group select{appearance:none;cursor:none;}
    .form-group select option{background:var(--navy);}
    .form-group textarea{resize:none;height:120px;}
    .btn-submit{width:100%;padding:17px;background:var(--gold-gradient);color:var(--navy);border:none;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:none;position:relative;overflow:hidden;transition:transform 0.3s ease,box-shadow 0.3s ease;}
    .btn-submit::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.15);transform:translateX(-100%);transition:transform 0.4s ease;}
    .btn-submit:hover::before{transform:translateX(0);}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 20px 50px rgba(201,168,76,0.3);}
    .form-success{display:none;text-align:center;padding:50px 30px;border:1px solid rgba(201,168,76,0.2);}
    .form-success.show{display:block;}

    /* RELATED */
    .related{padding:100px 60px;background:var(--navy-mid);}
    .related-inner{max-width:1400px;margin:0 auto;}
    .related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:60px;}
    .related-card{background:var(--navy);border:1px solid rgba(201,168,76,0.08);overflow:hidden;position:relative;transition:all 0.4s ease;text-decoration:none;display:block;color:inherit;}
    .related-card::after{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:var(--gold-gradient);transform:scaleX(0);transform-origin:left;transition:transform 0.4s ease;}
    .related-card:hover::after{transform:scaleX(1);}
    .related-card:hover{border-color:rgba(201,168,76,0.25);}
    .rc-visual{aspect-ratio:16/9;position:relative;overflow:hidden;}
    .rc-vis-inner{width:100%;height:100%;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);position:relative;}
    .related-card:hover .rc-vis-inner{transform:scale(1.05);}
    .rc-body{padding:28px;}
    .rc-tag{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;}
    .rc-name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--white);margin-bottom:10px;transition:color 0.3s ease;}
    .related-card:hover .rc-name{color:var(--gold-light);}
    .rc-desc{font-size:13px;color:var(--white-muted);line-height:1.6;margin-bottom:20px;}
    .rc-arrow{display:flex;align-items:center;gap:10px;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
    .rc-arrow-line{width:24px;height:1px;background:var(--gold);transition:width 0.3s ease;}
    .related-card:hover .rc-arrow-line{width:40px;}

    .reveal{opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.16,1,0.3,1);}

  const cursor=document.getElementById('cursor'),ring=document.getElementById('cursorRing');

  (function t(){ringX+=(mouseX-ringX)*0.12;ringY+=(mouseY-ringY)*0.12;ring.style.left=ringX+'px';ring.style.top=ringY+'px';requestAnimationFrame(t);})();
  function bindCursor(){
    document.querySelectorAll('a,button,.masonry-item,.amenity-card,.related-card,.hl-item').forEach(el=>{
      el.addEventListener('mouseenter',()=>{cursor.style.transform='translate(-50%,-50%) scale(2.5)';ring.style.transform='translate(-50%,-50%) scale(1.5)';ring.style.borderColor='rgba(201,168,76,0.8)';});
      el.addEventListener('mouseleave',()=>{cursor.style.transform='translate(-50%,-50%) scale(1)';ring.style.transform='translate(-50%,-50%) scale(1)';ring.style.borderColor='rgba(201,168,76,0.5)';});
    });
  }

  const obs=new IntersectionObserver(e=>{e.forEach(el=>{if(el.isIntersecting)el.target.classList.add('visible');});},{threshold:0.1});
  function bindReveal(){document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));}

  // ================================================================
  // LIGHTBOX
  // ================================================================
  let lbItems=[], lbIndex=0;
  function openLightbox(i){
    lbIndex=i; updateLB();
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow='hidden';
  }
  function closeLB(){document.getElementById('lightbox').classList.remove('active');document.body.style.overflow='';}
  function updateLB(){
    const item=lbItems[lbIndex];
    document.getElementById('lbDisplay').innerHTML=item.image?`<img src="${item.image}" alt="${item.caption||''}">`:getSVG(item.theme);
    document.getElementById('lbCaption').textContent=item.caption;
    document.getElementById('lbSub').textContent=item.sub||'';
    document.getElementById('lbCounter').textContent=(lbIndex+1)+' / '+lbItems.length;
  }
  document.getElementById('lbClose').addEventListener('click',closeLB);
  document.getElementById('lbPrev').addEventListener('click',()=>{lbIndex=(lbIndex-1+lbItems.length)%lbItems.length;updateLB();});
  document.getElementById('lbNext').addEventListener('click',()=>{lbIndex=(lbIndex+1)%lbItems.length;updateLB();});
  document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===document.getElementById('lightbox'))closeLB();});
  document.addEventListener('keydown',e=>{
    if(!document.getElementById('lightbox').classList.contains('active'))return;
    if(e.key==='Escape')closeLB();
    if(e.key==='ArrowLeft'){lbIndex=(lbIndex-1+lbItems.length)%lbItems.length;updateLB();}
    if(e.key==='ArrowRight'){lbIndex=(lbIndex+1)%lbItems.length;updateLB();}
  });

      item.addEventListener('click',()=>openLightbox(parseInt(item.dataset.index)));
    });

    bindReveal();
    bindCursor();

    // Enquiry form
    window.submitEnquiry = function(){
      const n=document.getElementById('eName').value, ph=document.getElementById('ePhone').value;
      if(!n||!ph){alert('Please enter your name and phone number.');return;}
      document.getElementById('enquiryForm').style.display='none';
      document.getElementById('enquirySuccess').classList.add('show');
    };
  }

  // ================================================================
  // INIT, read ?id= from URL
  // ================================================================
  async function init() {
    const id = new URLSearchParams(window.location.search).get('id');
    const res = await fetch('/assets/js/projects.json', { cache: 'no-store' });
    const { projects } = await res.json();

    if (!id) {
      // No ID, redirect to projects page
      window.location.href = '/projects/';
      return;
    }

    const project = projects.find(p => p.id === id);
    if (!project) {
      document.getElementById('pageBody').innerHTML = `
        <div class="not-found">
          <div style="font-family:'Cormorant Garamond',serif;font-size:80px;background:var(--gold-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:24px;">404</div>
          <h2 style="font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:300;margin-bottom:16px;">Project Not Found</h2>
          <p style="color:var(--white-muted);margin-bottom:40px;">The project you're looking for doesn't exist or may have moved.</p>
          <a href="/projects/" style="padding:14px 40px;background:var(--gold-gradient);color:var(--navy);text-decoration:none;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;">View All Projects</a>
        </div>`;
      return;
    }

    renderPage(project, projects);
  }

  init().catch(console.error);
  </script>
</body>
</html>
